<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АСЯ — Панель оператора</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0eff5;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

header{background:#7856FF;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:0 2px 12px rgba(120,86,255,.3);}
header h1{font-size:17px;font-weight:700;}
.badge{background:rgba(255,255,255,.2);border-radius:20px;padding:2px 10px;font-size:12px;}
.upd{margin-left:auto;font-size:11px;opacity:.65;}

.main{display:flex;flex:1;overflow:hidden;}

/* Sidebar */
.sidebar{width:290px;background:#fff;border-right:1px solid #e8e8f0;display:flex;flex-direction:column;flex-shrink:0;}
.sb-head{padding:12px 16px;font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.06em;font-weight:700;border-bottom:1px solid #f0eff5;}
.sess-list{flex:1;overflow-y:auto;}
.sess-item{padding:12px 16px;border-bottom:1px solid #f5f4fa;cursor:pointer;transition:background .12s;position:relative;}
.sess-item:hover{background:#f8f7ff;}
.sess-item.active{background:#ede9ff;border-left:3px solid #7856FF;}
.sess-id{font-size:12px;font-weight:700;color:#7856FF;font-family:monospace;}
.sess-meta{font-size:11px;color:#aaa;margin-top:3px;}
.new-dot{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:8px;height:8px;background:#FF7557;border-radius:50%;}
.no-sess{padding:40px 16px;text-align:center;color:#bbb;font-size:13px;}

/* Chat panel */
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#ccc;}
.empty-state svg{opacity:.4;}
.empty-state p{font-size:14px;}

.chat-header{padding:14px 20px;background:#fff;border-bottom:1px solid #e8e8f0;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.sid-tag{font-family:monospace;font-size:13px;background:#f0eff5;padding:4px 10px;border-radius:6px;color:#7856FF;font-weight:700;}
.lang-tag{font-size:11px;background:#e8f5e9;color:#2e7d32;padding:3px 8px;border-radius:4px;font-weight:700;}
.chat-time{margin-left:auto;font-size:11px;color:#bbb;}

.messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px;}
.msg{max-width:72%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.55;word-wrap:break-word;}
.msg .role{font-size:10px;font-weight:700;opacity:.5;text-transform:uppercase;margin-bottom:3px;}
.msg .ts{font-size:10px;opacity:.45;margin-top:4px;}
.msg.user{align-self:flex-end;background:#7856FF;color:#fff;border-bottom-right-radius:4px;}
.msg.assistant{align-self:flex-start;background:#fff;color:#333;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.msg.admin{align-self:flex-start;background:#fff8e1;color:#b45309;border:1px solid #fde68a;border-bottom-left-radius:4px;}

.reply-area{padding:14px 20px;background:#fff;border-top:1px solid #e8e8f0;display:flex;gap:10px;align-items:flex-end;flex-shrink:0;}
.reply-area textarea{flex:1;padding:10px 14px;border:2px solid #e5e5e5;border-radius:10px;font-size:14px;resize:none;outline:none;font-family:inherit;line-height:1.4;max-height:120px;transition:border-color .2s;}
.reply-area textarea:focus{border-color:#7856FF;}
.reply-area button{padding:10px 20px;background:#7856FF;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s;}
.reply-area button:hover{background:#6644ee;}
.reply-area button:disabled{background:#ccc;cursor:default;}

#chat-view{display:none;flex:1;flex-direction:column;overflow:hidden;}
</style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
  <h1>АСЯ — Панель оператора</h1>
  <span class="badge" id="sess-count">загрузка...</span>
  <span class="upd" id="last-upd"></span>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sb-head">Сессии</div>
    <div class="sess-list" id="sess-list"><div class="no-sess">Загрузка...</div></div>
  </div>

  <div class="chat-panel">
    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="#7856FF"><path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      <p>Выберите сессию слева</p>
    </div>
    <div id="chat-view">
      <div class="chat-header">
        <span class="sid-tag" id="hdr-sid"></span>
        <span class="lang-tag" id="hdr-lang"></span>
        <span class="chat-time" id="hdr-time"></span>
      </div>
      <div class="messages" id="messages"></div>
      <div class="reply-area">
        <textarea id="reply-txt" placeholder="Написать клиенту..." rows="1"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
        <button id="send-btn" onclick="send()">Отправить</button>
      </div>
    </div>
  </div>
</div>

<script>
const SB  = 'https://mybktwuukvphaypyewfp.supabase.co';
const SK  = 'sb_publishable_QLjVoZTyCx_VNWrs5A_JPw_ZIOmkiil';
const HDR = {'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'};

let activeSid = null, sessions = [], msgs = [], prevMsgCount = 0;

function get(table, qs) {
  return fetch(SB+'/rest/v1/'+table+'?'+qs, {headers:HDR}).then(r=>r.ok?r.json():[]);
}
function post(table, data, extra) {
  return fetch(SB+'/rest/v1/'+table, {
    method:'POST',
    headers: Object.assign({},HDR, extra||{}),
    body: JSON.stringify(data)
  });
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}) + ' ' +
         d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit'});
}

/* ---- Sessions ---- */
function loadSessions() {
  get('dental_sessions','select=*&order=last_message_at.desc').then(data=>{
    sessions = data;
    document.getElementById('sess-count').textContent = data.length + ' сессий';
    document.getElementById('last-upd').textContent = 'обновлено '+new Date().toLocaleTimeString('ru');
    renderSessions();
  });
}

function renderSessions() {
  const el = document.getElementById('sess-list');
  if (!sessions.length) { el.innerHTML='<div class="no-sess">Нет активных сессий</div>'; return; }
  el.innerHTML = sessions.map(s=>{
    const active = s.session_id===activeSid ? ' active' : '';
    return `<div class="sess-item${active}" onclick="select('${s.session_id}','${s.page_lang||'ru'}')">
      <div class="sess-id">${s.session_id}</div>
      <div class="sess-meta">${fmtTime(s.last_message_at)} &nbsp;·&nbsp; ${(s.page_lang||'ru').toUpperCase()}</div>
    </div>`;
  }).join('');
}

/* ---- Messages ---- */
function select(sid, lang) {
  activeSid = sid; prevMsgCount = 0;
  document.getElementById('hdr-sid').textContent = sid;
  document.getElementById('hdr-lang').textContent = (lang||'ru').toUpperCase();
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('chat-view').style.display = 'flex';
  document.getElementById('chat-view').style.flexDirection = 'column';
  renderSessions();
  loadMessages(true);
}

function loadMessages(scroll) {
  if (!activeSid) return;
  get('dental_messages','session_id=eq.'+activeSid+'&select=*&order=created_at.asc').then(data=>{
    const sess = sessions.find(s=>s.session_id===activeSid);
    if (sess) document.getElementById('hdr-time').textContent = fmtTime(sess.last_message_at);
    msgs = data;
    const hasNew = data.length !== prevMsgCount;
    prevMsgCount = data.length;
    if (scroll || hasNew) renderMessages();
  });
}

function renderMessages() {
  const box = document.getElementById('messages');
  const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 60;
  const roleLabel = {user:'Клиент', assistant:'АСЯ', admin:'Оператор'};
  box.innerHTML = msgs.map(m=>{
    const t = new Date(m.created_at).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
    return `<div class="msg ${m.role}">
      <div class="role">${roleLabel[m.role]||m.role}</div>
      ${m.content.replace(/</g,'&lt;').replace(/\n/g,'<br>')}
      <div class="ts">${t}</div>
    </div>`;
  }).join('');
  if (atBottom || msgs.length <= 3) box.scrollTop = box.scrollHeight;
}

/* ---- Send admin reply ---- */
function send() {
  const txt = document.getElementById('reply-txt').value.trim();
  if (!txt || !activeSid) return;
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  document.getElementById('reply-txt').value = '';
  document.getElementById('reply-txt').style.height = 'auto';

  post('dental_messages', {session_id:activeSid, role:'admin', content:txt})
    .then(()=>{
      post('dental_sessions',
        {session_id:activeSid, last_message_at:new Date().toISOString(), page_lang:'ru'},
        {'Prefer':'resolution=merge-duplicates'}
      );
      loadMessages(true);
    })
    .catch(()=>alert('Ошибка отправки'))
    .finally(()=>{ btn.disabled=false; });
}

/* ---- Init & Polling ---- */
loadSessions();
setInterval(loadSessions, 10000);
setInterval(()=>loadMessages(false), 3000);
</script>
</body>
</html>
