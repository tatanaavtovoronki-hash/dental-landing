server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Не кэшировать HTML
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri =404;
    }

    location = /ru { add_header Cache-Control "no-cache"; try_files /index.html =404; }
    location = /ua { add_header Cache-Control "no-cache"; try_files /index_ua.html =404; }
    location = /en { add_header Cache-Control "no-cache"; try_files /index_en.html =404; }
    location = /de { add_header Cache-Control "no-cache"; try_files /index_de.html =404; }
    location = /es { add_header Cache-Control "no-cache"; try_files /index_es.html =404; }

    location = /admin {
        auth_basic "Admin";
        auth_basic_user_file /usr/share/nginx/html/.htpasswd;
        add_header Cache-Control "no-cache";
        try_files /admin.html =404;
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
